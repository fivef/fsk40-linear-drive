; PlatformIO Project Configuration File
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs =
    secrets.ini

[env:base_nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    waspinator/AccelStepper@^1.64
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    ; WiFi credentials are provided by secrets.ini (untracked).
    ; Create secrets.ini based on the template in README.md.
    -D WIFI_SSID=\"placeholder\"
    -D WIFI_PASSWORD=\"placeholder\"

[env:nodemcuv2]
extends = env:base_nodemcu
upload_protocol = espota    ; OTA upload using hostname or IP
upload_port = linear-guide.local

[env:nodemcuv2_usb]
extends = env:base_nodemcu
upload_protocol = serial    ; USB/serial upload (first flash)
