<!DOCTYPE html><html><head><title>Linear Guide Control</title></head><body><h1>Linear Guide Parameters</h1><form><label>Speed (mm/s): <input type='number' id='speed'></label><br><label>Position (mm): <input type='number' id='position'></label><br><label>Acceleration (mm/s²): <input type='number' id='acceleration'></label><br><button type='submit'>Apply Settings</button></form><script>document.querySelector('form').addEventListener('submit', async (e) => { e.preventDefault(); const data = new FormData(e.target); const params = Object.fromEntries(data); fetch('/api/set-params', { method: 'POST', body: JSON.stringify(params) }); });</script></body></html>
